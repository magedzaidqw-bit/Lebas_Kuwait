<style>
  :root {
    --canvas: #F2ECDE;
    --paper: #FFFDF8;
    --paper-soft: #EFE7D4;
    --stitch: #C9BC9C;
    --ink: #2A2620;
    --ink-soft: #6E6656;
    --ink-faint: #A69B82;
    --green: #3F6B2C;
    --green-deep: #2F5220;
    --green-bright: #6FA83A;
    --amber-ink: #7A5710;
    --amber-bg: #EDDDAF;
    --red-ink: #8C2F2F;
    --red-bg: #F1D6CE;
    --red-border: #D9A99B;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--canvas);
    background-image:
      linear-gradient(var(--canvas) 1px, transparent 1px),
      linear-gradient(90deg, var(--canvas) 1px, transparent 1px);
    color: var(--ink);
    font-family: 'Cairo', 'Tahoma', sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 0 16px 96px; }

  header.app-header {
    padding: 30px 0 22px;
    border-bottom: 2px dashed var(--stitch);
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 14px;
  }
  .logo-badge {
    width: 52px; height: 52px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative;
    background: var(--paper);
    border: 2px dashed var(--stitch);
    padding: 5px;
  }
  .logo-badge::after {
    content: ''; position: absolute; top: -4px; right: -4px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--paper); border: 1.5px solid var(--stitch);
  }
  .logo-badge img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
  header.app-header h1 { margin: 0; font-size: 22px; font-weight: 800; color: var(--ink); letter-spacing: -0.3px; }
  header.app-header p { margin: 3px 0 0; font-size: 13px; color: var(--ink-soft); font-weight: 500; }

  .tabs {
    display: flex; gap: 4px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 0;
    border-bottom: 1px solid var(--stitch);
  }
  .tab-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 11px 18px; border: none; cursor: pointer;
    font-size: 14px; font-weight: 600; white-space: nowrap;
    background: transparent; color: var(--ink-faint);
    font-family: inherit; border-bottom: 3px solid transparent;
    margin-bottom: -1px;
  }
  .tab-btn.active { color: var(--green-deep); border-bottom-color: var(--green); font-weight: 800; }

  .card {
    background: var(--paper); border: 1px solid var(--stitch); border-radius: 12px;
    padding: 20px; margin-bottom: 16px;
    box-shadow: 0 1px 0 rgba(42,38,32,0.04);
  }
  .card h2 { margin: 0 0 14px; font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; color: var(--ink); }
  .card p.hint { font-size: 13px; color: var(--ink-soft); margin: -8px 0 16px; }

  .stat-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .stat {
    flex: 1; min-width: 130px; background: var(--paper); border: 1px solid var(--stitch);
    border-radius: 12px; padding: 15px 16px 15px 16px; border-inline-end: 3px solid var(--green);
  }
  .stat .label { font-size: 11px; color: var(--ink-soft); margin-bottom: 5px; font-weight: 700; letter-spacing: 0.3px; }
  .stat .value { font-size: 21px; font-weight: 800; color: var(--ink); }
  .stat .value.amber { color: var(--amber-ink); }
  .stat .value.green { color: var(--green-deep); }

  label { display: block; font-size: 13px; color: var(--ink-soft); margin-bottom: 6px; font-weight: 600; }
  .field { margin-bottom: 14px; }
  input, select {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1.5px solid var(--stitch);
    background: var(--paper-soft); color: var(--ink); font-size: 14px; font-family: inherit;
  }
  input:focus, select:focus { outline: none; border-color: var(--green); }

  .btn {
    background: var(--green); color: #fff; border: none; border-radius: 8px;
    padding: 12px 18px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 6px; justify-content: center;
  }
  .btn:hover { background: var(--green-deep); }
  .btn:disabled { background: var(--paper-soft); color: var(--ink-faint); border: 1.5px solid var(--stitch); cursor: not-allowed; }
  .btn.full { width: 100%; }
  .btn.ghost { background: transparent; border: 1.5px solid var(--stitch); color: var(--ink-soft); }

  .pill-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
  .pill-toggle button {
    flex: 1; padding: 10px; border-radius: 8px; border: 1.5px solid var(--stitch);
    background: var(--paper-soft); color: var(--ink-soft); font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .pill-toggle button.active-purchase { background: var(--green); border-color: var(--green); color: #fff; }
  .pill-toggle button.active-assoc { background: var(--amber-ink); border-color: var(--amber-ink); color: #fff; }

  .row-item {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px;
    background: var(--paper-soft); border: 1px solid var(--stitch); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 8px;
  }
  .row-item .name { font-weight: 800; color: var(--ink); }
  .row-item .sub { font-size: 12px; color: var(--ink-soft); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
  .metrics { display: flex; gap: 18px; font-size: 13px; }
  .metrics .m-label { color: var(--ink-soft); font-size: 11px; font-weight: 700; }
  .metrics .m-value { font-weight: 800; color: var(--ink); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: right; color: var(--ink-soft); font-weight: 700; padding: 8px 6px; border-bottom: 2px dashed var(--stitch); }
  tbody td { padding: 9px 6px; border-bottom: 1px solid var(--paper-soft); color: var(--ink); }
  tbody tr:last-child td { border-bottom: none; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 999px; font-weight: 700; display: inline-flex; align-items:center; gap:4px; }
  .badge.purchase { background: rgba(63,107,44,0.15); color: var(--green-deep); }
  .badge.assoc { background: var(--amber-bg); color: var(--amber-ink); }
  .badge.flagged { background: var(--red-bg); color: var(--red-ink); border: 1px solid var(--red-border); }
  .badge.ok { background: rgba(63,107,44,0.12); color: var(--green-deep); }

  .empty { text-align: center; padding: 28px 0; color: var(--ink-faint); font-size: 13px; }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(42,38,32,0.45); display: flex; align-items: center; justify-content: center;
    padding: 16px; z-index: 50;
  }
  .modal {
    background: var(--paper); border: 2px dashed var(--stitch); border-radius: 14px; padding: 22px;
    width: 100%; max-width: 420px;
  }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .modal-head h3 { margin: 0; font-size: 17px; font-weight: 800; color: var(--ink); }
  .modal-head button { background: none; border: none; color: var(--ink-soft); font-size: 20px; cursor: pointer; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 7px 13px; border-radius: 8px; border: 1.5px solid var(--stitch); color: var(--ink-soft);
    background: var(--paper-soft); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .chip.active { background: var(--green); border-color: var(--green); color: #fff; }
  .modal-actions { display: flex; gap: 8px; margin-top: 8px; }

  .banner {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px;
    background: var(--paper-soft); border: 2px dashed var(--green); border-radius: 12px; padding: 14px 18px; margin-bottom: 20px;
  }
  .banner .left { display: flex; align-items: center; gap: 10px; }
  .banner .t { font-weight: 800; font-size: 14px; color: var(--ink); }
  .banner .d { font-size: 12px; color: var(--ink-soft); }
  .error-banner {
    background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red-ink);
    border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .loading { text-align: center; padding: 100px 0; color: var(--ink-soft); font-weight: 600; }
  .grid3 { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 640px) { .grid3 { grid-template-columns: 1fr 1fr 1fr; } }

  @media print {
    body * { visibility: hidden; }
    .print-sheet, .print-sheet * { visibility: visible; }
    .print-sheet { position: absolute; inset: 0; width: 100%; background: #fff; padding: 24px 28px; }
    .print-sheet table { font-size: 12px; border-collapse: collapse; width: 100%; }
    .print-sheet th, .print-sheet td { border: 1px solid #333; padding: 6px 8px; }
    .print-sheet thead th { background: #f0f0f0; font-weight: 800; }
    .print-sheet .print-header { border-bottom: 2px solid #000; margin-bottom: 24px; padding-bottom: 18px; }
  }
</style>
</head>

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let state = {
  tab: "manager",
  agents: null,
  collections: null,
  warehouse: null,
  payments: null,
  error: null,
  profile: null,      // row from app_users for the signed-in person
  authView: "landing", // 'landing' | 'login' | 'force_password' | 'app'
  authError: null,
  selectedPortal: null, // which door they tapped on the landing screen
};

function fmtKWD(n) { return `${Number(n).toFixed(3)} د.ك`; }
function todayStr() { return new Date().toISOString().slice(0,10); }
function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function loadAll() {
  state.error = null;
  try {
    const [{data: agents, error: e1}, {data: collections, error: e2}, {data: warehouse, error: e3}, {data: treasury, error: e4}, {data: odometer, error: e5}, {data: payments, error: e6}] =
      await Promise.all([
        sb.from('agents').select('*').order('created_at', {ascending: false}),
        sb.from('collections').select('*').order('collected_at', {ascending: false}).limit(300),
        sb.from('warehouse_entries').select('*').order('entry_date', {ascending: false}).limit(200),
        sb.from('treasury_entries').select('*').order('entry_date', {ascending: true}).limit(1000),
        sb.from('odometer_readings').select('*').order('month', {ascending: false}).limit(200),
        sb.from('payments').select('*').order('paid_at', {ascending: false}).limit(200),
      ]);
    if (e1 || e2 || e3 || e4 || e5) throw (e1 || e2 || e3 || e4 || e5);
    state.agents = agents || [];
    state.collections = collections || [];
    state.warehouse = warehouse || [];
    state.treasury = treasury || [];
    state.odometer = odometer || [];
    state.payments = payments || [];
  } catch (err) {
    console.error(err);
    state.error = "تعذّر الاتصال بقاعدة البيانات: " + (err && err.message ? err.message : JSON.stringify(err)) + " — تأكد من تنفيذ schema.sql كاملًا في Supabase.";
  }
  render();
}

// ---------- Auth ----------
const EMAIL_DOMAIN = "@lebas.local"; // civil ID logins map to civilId@lebas.local internally

function roleLabel(role) {
  return { manager: "مدير", agent: "مندوب", supervisor: "مشرف", accountant: "محاسب" }[role] || role;
}

async function checkAuth() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session && session.user) {
      await loadProfileAndProceed(session.user.email);
    } else {
      state.authView = 'landing';
      render();
    }
  } catch (err) {
    console.error(err);
    state.authView = 'landing';
    render();
  }
}

async function loadProfileAndProceed(email) {
  try {
    const { data, error } = await sb.from('app_users').select('*').eq('email', email).single();
    if (error || !data) {
      console.error('app_users lookup failed:', error);
      const notFound = error && error.code === 'PGRST116'; // "no rows" from .single()
      state.authError = notFound
        ? "تم تسجيل الدخول، لكن لا يوجد حساب مرتبط بك في النظام. تواصل مع المدير."
        : "تعذّر تحميل بيانات الحساب: " + (error ? error.message : "خطأ غير معروف") + " (راجع Console للتفاصيل)";
      await sb.auth.signOut();
      state.authView = 'login';
      render();
      return;
    }
    state.profile = data;

    // If they came in through a specific door, that door must match their real role —
    // a supervisor account logging in via "بوابة المحاسب" should be rejected, not silently redirected.
    if (state.selectedPortal && data.role !== state.selectedPortal) {
      state.authError = `هذا الحساب مسجّل كـ "${roleLabel(data.role)}"، وليس "${roleLabel(state.selectedPortal)}". ادخل من البوابة الصحيحة، أو تواصل مع المدير إذا كنت تظن أن هذا خطأ.`;
      state.profile = null;
      await sb.auth.signOut();
      state.authView = 'login';
      render();
      return;
    }

    if (data.must_change_password) {
      state.authView = 'force_password';
      render();
    } else {
      state.authView = 'app';
      state.tab = data.role === 'manager' ? 'manager' : data.role;
      await loadAll();
    }
  } catch (err) {
    console.error(err);
    state.authError = "حدث خطأ أثناء تحميل بيانات الحساب.";
    state.authView = 'login';
    render();
  }
}

function renderLanding() {
  const content = document.getElementById('content');
  document.getElementById('tabs').innerHTML = '';
  document.getElementById('header-actions').innerHTML = '';
  document.getElementById('banner-slot').innerHTML = '';
  document.getElementById('error-slot').innerHTML = '';

  const doors = [
    { id: "manager", label: "بوابة المدير", icon: "📊" },
    { id: "agent", label: "بوابة المندوب", icon: "🚚" },
    { id: "supervisor", label: "بوابة المشرف", icon: "🏬" },
    { id: "accountant", label: "بوابة المحاسب", icon: "🧮" },
  ];
  content.innerHTML = `
    <div style="max-width:420px; margin:30px auto 0;">
      <p style="text-align:center; color:var(--ink-soft); font-weight:600; margin-bottom:16px;">اختر بوابتك للدخول</p>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        ${doors.map(d => `
          <button class="door-btn" data-portal="${d.id}" style="
            background:var(--paper); border:2px dashed var(--stitch); border-radius:14px;
            padding:22px 10px; text-align:center; cursor:pointer; font-family:inherit;">
            <div style="font-size:28px; margin-bottom:8px;">${d.icon}</div>
            <div style="font-weight:800; font-size:14px; color:var(--ink);">${d.label}</div>
          </button>`).join('')}
      </div>
    </div>
  `;
  document.querySelectorAll('.door-btn').forEach(b => b.onclick = () => {
    state.selectedPortal = b.dataset.portal;
    state.authView = 'login';
    state.authError = null;
    render();
  });
}

function renderLoginScreen() {
  const content = document.getElementById('content');
  document.getElementById('tabs').innerHTML = '';
  document.getElementById('header-actions').innerHTML = '';
  document.getElementById('banner-slot').innerHTML = '';
  document.getElementById('error-slot').innerHTML = '';
  const portalTitle = state.selectedPortal ? roleLabel(state.selectedPortal) : null;
  content.innerHTML = `
    <div class="card" style="max-width:380px; margin:40px auto;">
      ${portalTitle ? `<button id="btn-back-landing" class="btn ghost" style="padding:6px 10px; font-size:12px; margin-bottom:14px;">‹ رجوع</button>` : ''}
      <h2 style="text-align:center; font-size:20px; margin-bottom:4px;">${portalTitle ? `دخول ${portalTitle}` : 'دخول النظام'}</h2>
      <p class="hint" style="text-align:center;">لباس الكويت — شركة زيرو ويست</p>
      <div class="field"><label>الرقم المدني</label><input id="login-civil-id" inputmode="numeric" placeholder="مثال: 289010112233" dir="ltr" /></div>
      <div class="field"><label>كلمة المرور</label><input id="login-password" type="password" placeholder="••••••••" /></div>
      <div id="login-error" style="color:var(--red-ink); font-size:13px; margin-bottom:10px; font-weight:600;"></div>
      <button class="btn full" id="btn-login">دخول</button>
    </div>
  `;
  if (state.authError) document.getElementById('login-error').textContent = state.authError;
  const backBtn = document.getElementById('btn-back-landing');
  if (backBtn) backBtn.onclick = () => { state.authView = 'landing'; state.selectedPortal = null; render(); };

  document.getElementById('btn-login').onclick = async () => {
    const civilId = document.getElementById('login-civil-id').value.trim().replace(/@.*$/, '');
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    if (!civilId || !password) { errEl.textContent = "أدخل الرقم المدني وكلمة المرور."; return; }
    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.textContent = "جارِ الدخول...";
    const { error } = await sb.auth.signInWithPassword({ email: civilId + EMAIL_DOMAIN, password });
    if (error) {
      errEl.textContent = "الرقم المدني أو كلمة المرور غير صحيحة.";
      btn.disabled = false; btn.textContent = "دخول";
      return;
    }
    const { data: { session } } = await sb.auth.getSession();
    await loadProfileAndProceed(session.user.email);
  };
}

function renderForcePasswordScreen() {
  const content = document.getElementById('content');
  document.getElementById('tabs').innerHTML = '';
  document.getElementById('header-actions').innerHTML = '';
  content.innerHTML = `
    <div class="card" style="max-width:380px; margin:40px auto;">
      <h2 style="text-align:center; font-size:20px; margin-bottom:4px;">تعيين كلمة مرور جديدة</h2>
      <p class="hint" style="text-align:center;">هذا أول دخول لك، غيّر كلمة المرور قبل المتابعة</p>
      <div class="field"><label>كلمة المرور الجديدة</label><input id="new-password" type="password" placeholder="8 أحرف على الأقل" /></div>
      <div class="field"><label>تأكيد كلمة المرور</label><input id="confirm-password" type="password" /></div>
      <div id="pw-error" style="color:var(--red-ink); font-size:13px; margin-bottom:10px; font-weight:600;"></div>
      <button class="btn full" id="btn-set-password">حفظ ومتابعة</button>
    </div>
  `;
  document.getElementById('btn-set-password').onclick = async () => {
    const p1 = document.getElementById('new-password').value;
    const p2 = document.getElementById('confirm-password').value;
    const errEl = document.getElementById('pw-error');
    if (p1.length < 8) { errEl.textContent = "كلمة المرور يجب أن تكون 8 أحرف على الأقل."; return; }
    if (p1 !== p2) { errEl.textContent = "كلمتا المرور غير متطابقتين."; return; }
    const btn = document.getElementById('btn-set-password');
    btn.disabled = true; btn.textContent = "جارِ الحفظ...";
    const { error: authErr } = await sb.auth.updateUser({ password: p1 });
    if (authErr) { errEl.textContent = "تعذّر تحديث كلمة المرور: " + authErr.message; btn.disabled = false; btn.textContent = "حفظ ومتابعة"; return; }
    await sb.from('app_users').update({ must_change_password: false }).eq('id', state.profile.id);
    state.profile.must_change_password = false;
    state.authView = 'app';
    state.tab = state.profile.role === 'manager' ? 'manager' : state.profile.role;
    await loadAll();
  };
}

async function handleLogout() {
  await sb.auth.signOut();
  state.profile = null;
  state.agents = null; state.collections = null; state.warehouse = null; state.payments = null;
  state.authView = 'landing';
  state.selectedPortal = null;
  render();
}

function balancesFor(agentId) {
  const kg = state.collections.filter(c => c.agent_id === agentId).reduce((s,c) => s + Number(c.weight_kg), 0);
  const orders = state.collections.filter(c => c.agent_id === agentId).length;
  const owed = state.collections.filter(c => c.agent_id === agentId && c.order_type === 'purchase').reduce((s,c) => s + Number(c.amount_kwd), 0);
  const paid = state.payments.filter(p => p.agent_id === agentId).reduce((s,p) => s + Number(p.amount_kwd), 0);
  return { kg, orders, owed, paid, remaining: owed - paid };
}

function agentName(id) {
  return state.agents.find(a => a.id === id)?.name || "—";
}

// ---------- render shell ----------
function render() {
  if (state.authView === 'landing') { renderLanding(); return; }
  if (state.authView === 'login') { renderLoginScreen(); return; }
  if (state.authView === 'force_password') { renderForcePasswordScreen(); return; }

  const allTabs = [
    { id: "manager", label: "بوابة المدير", icon: "📊" },
    { id: "agent", label: "بوابة المندوب", icon: "🚚" },
    { id: "supervisor", label: "بوابة المشرف", icon: "🏬" },
    { id: "accountant", label: "بوابة المحاسب", icon: "🧮" },
    { id: "reports", label: "التقارير والرسوم البيانية", icon: "📈" },
    { id: "treasury", label: "الخزينة", icon: "🏦" },
  ];
  const role = state.profile ? state.profile.role : 'manager';
  const tabs = allTabs.filter(t => {
    if (t.id === 'reports') return role === 'manager';
    if (t.id === 'treasury') return role === 'manager' || role === 'accountant';
    return role === 'manager' || t.id === role;
  });
  if (!tabs.find(t => t.id === state.tab)) state.tab = tabs[0].id;

  if (tabs.length > 1) {
    document.getElementById('tabs').innerHTML = tabs.map(t =>
      `<button class="tab-btn ${state.tab===t.id?'active':''}" data-tab="${t.id}">${t.icon} ${t.label}</button>`
    ).join('');
    document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => { state.tab = b.dataset.tab; render(); });
  } else {
    // Single-portal role: this IS their whole app, no tab switcher to show
    document.getElementById('tabs').innerHTML = `
      <div style="padding:10px 4px; font-weight:800; font-size:15px; color:var(--green-deep); display:flex; align-items:center; gap:8px;">
        ${tabs[0].icon} ${tabs[0].label}
      </div>`;
  }

  document.getElementById('header-actions').innerHTML = state.profile ? `
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="text-align:left;">
        <div style="font-size:13px; font-weight:700; color:var(--ink);">${esc(state.profile.full_name || '')}</div>
        <div style="font-size:11px; color:var(--ink-soft);">${roleLabel(state.profile.role)}</div>
      </div>
      <button id="btn-logout" class="btn ghost" style="padding:8px 12px; font-size:12px;">خروج</button>
    </div>` : '';
  const logoutBtn = document.getElementById('btn-logout');
  if (logoutBtn) logoutBtn.onclick = handleLogout;

  document.getElementById('error-slot').innerHTML = state.error
    ? `<div class="error-banner"><span>⚠️ ${esc(state.error)}</span><button onclick="loadAll()" class="btn ghost" style="padding:6px 10px;">إعادة المحاولة</button></div>`
    : '';

  const empty = state.agents && state.agents.length === 0 && state.collections.length === 0;
  document.getElementById('banner-slot').innerHTML = empty ? `
    <div class="banner">
      <div class="left"><span style="font-size:20px;">✨</span>
        <div><div class="t">لا يوجد مناديب بعد</div><div class="d">ابدأ بإضافة أول مندوب من بوابة المدير</div></div>
      </div>
    </div>` : '';

  const content = document.getElementById('content');
  if (state.agents === null) { content.innerHTML = `<div class="loading">جارِ تحميل البيانات...</div>`; return; }

  if (state.tab === 'manager') renderManager(content);
  else if (state.tab === 'agent') renderAgent(content);
  else if (state.tab === 'supervisor') renderSupervisor(content);
  else if (state.tab === 'accountant') renderAccountant(content);
  else if (state.tab === 'reports') renderReports(content);
  else if (state.tab === 'treasury') renderTreasury(content);
}

function csvDownload(filename, rows) {
  const csv = rows.map(r => r.map(v => `"${String(v ?? '').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}

async function deleteAgent(agentId, agentName) {
  const hasData = state.collections.some(c => c.agent_id === agentId) ||
                  state.warehouse.some(w => w.agent_id === agentId) ||
                  state.payments.some(p => p.agent_id === agentId);
  const warning = hasData
    ? `تنبيه: "${agentName}" له عمليات أو دفعات مسجّلة فعليًا. حذفه غير ممكن قبل حذف سجلاته أولًا. هل تريد المحاولة؟`
    : `هل تريد حذف المندوب "${agentName}"؟ هذا الإجراء لا يمكن التراجع عنه.`;
  if (!confirm(warning)) return;
  const { error } = await sb.from('agents').delete().eq('id', agentId);
  if (error) {
    state.error = "تعذّر حذف المندوب: " + error.message + (error.code === '23503' ? " (له سجلات مرتبطة به لا يمكن حذف المندوب قبل حذفها)" : "");
    render();
    return;
  }
  await loadAll();
}

function collectionsTable(rows) {
  if (rows.length === 0) return `<div class="empty">لا توجد عمليات مسجّلة بعد.</div>`;
  return `<table><thead><tr><th>التاريخ</th><th>المندوب</th><th>الوزن</th><th>النوع</th><th>المبلغ</th></tr></thead><tbody>
    ${rows.map(c => `<tr>
      <td>${esc(c.collected_at)}</td>
      <td>${esc(agentName(c.agent_id))}</td>
      <td>${Number(c.weight_kg).toFixed(1)} كغم</td>
      <td>${c.order_type === 'purchase' ? `<span class="badge purchase">شراء</span>` : `<span class="badge assoc">جمعية: ${esc(c.association_name||'—')}</span>`}</td>
      <td>${c.order_type === 'purchase' ? fmtKWD(c.amount_kwd) : '—'}</td>
    </tr>`).join('')}
  </tbody></table>`;
}

function openOdometerModal(agent, month) {
  if (!agent) return;
  const existing = state.odometer.find(o => o.agent_id === agent.id && o.month === month);
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-head"><h3>⛽ قراءة العداد — ${esc(agent.name)}</h3><button id="m-close">×</button></div>
      <p class="hint">أدخل قراءة العداد أول الشهر ونهايته. هذا مؤشر مراجعة تقريبي (كغم/كم)، وليس دليلًا قاطعًا — راجع تسوية المخزون في بوابة المشرف للتأكد الفعلي من الأوزان.</p>
      <div class="field"><label>الشهر</label><input value="${month}" disabled style="opacity:0.6;" /></div>
      <div class="field"><label>قراءة بداية الشهر (كم)</label><input id="m-start" inputmode="decimal" value="${existing && existing.start_km!=null ? existing.start_km : ''}" placeholder="مثال: 50000" /></div>
      <div class="field"><label>قراءة نهاية الشهر (كم)</label><input id="m-end" inputmode="decimal" value="${existing && existing.end_km!=null ? existing.end_km : ''}" placeholder="مثال: 55000" /></div>
      <div class="modal-actions">
        <button class="btn ghost" id="m-cancel" style="flex:1;">إلغاء</button>
        <button class="btn" id="m-save" style="flex:1;">حفظ</button>
      </div>
    </div>`;
  document.body.appendChild(backdrop);
  backdrop.querySelector('#m-close').onclick = () => backdrop.remove();
  backdrop.querySelector('#m-cancel').onclick = () => backdrop.remove();
  backdrop.onclick = (e) => { if (e.target === backdrop) backdrop.remove(); };
  backdrop.querySelector('#m-save').onclick = async () => {
    const saveBtn = backdrop.querySelector('#m-save');
    saveBtn.disabled = true; saveBtn.textContent = "جارِ الحفظ...";
    const startVal = backdrop.querySelector('#m-start').value.trim();
    const endVal = backdrop.querySelector('#m-end').value.trim();
    const payload = {
      agent_id: agent.id, month,
      start_km: startVal === '' ? null : parseFloat(startVal),
      end_km: endVal === '' ? null : parseFloat(endVal),
    };
    const { error } = await sb.from('odometer_readings').upsert(payload, { onConflict: 'agent_id,month' });
    if (error) { state.error = "تعذّر حفظ قراءة العداد: " + error.message; render(); }
    backdrop.remove();
    await loadAll();
  };
}

  const purBtn = document.getElementById('ot-purchase'), assocBtn = document.getElementById('ot-assoc');
  const assocField = document.getElementById('assoc-field');
  purBtn.onclick = () => { orderType='purchase'; purBtn.className='active-purchase'; assocBtn.className=''; assocField.style.display='none'; checkAgentValid(); };
  assocBtn.onclick = () => { orderType='association'; assocBtn.className='active-assoc'; purBtn.className=''; assocField.style.display='block'; checkAgentValid(); };

  const weightEl = document.getElementById('a-weight'), locEl = document.getElementById('a-location'), cphoneEl = document.getElementById('a-cphone'), assocEl = document.getElementById('a-assoc');
  const govEl = document.getElementById('a-governorate');
  const submitBtn = document.getElementById('a-submit');
  const preview = document.getElementById('amount-preview');

  function checkAgentValid() {
    const w = parseFloat(weightEl.value) || 0;
    if (orderType === 'purchase' && w > 0) {
      preview.innerHTML = `<div class="row-item" style="justify-content:space-between;"><span style="color:var(--muted2);font-size:13px;">المبلغ المستحق</span><span style="font-weight:700;font-size:16px;">${fmtKWD(w*PRICE_PER_KG)}</span></div>`;
    } else preview.innerHTML = '';
    const valid = w > 0 && govEl.value && locEl.value.trim() && cphoneEl.value.trim() && (orderType==='purchase' || (assocEl && assocEl.value.trim()));
    submitBtn.disabled = !valid;
  }
  [weightEl, locEl, cphoneEl].forEach(e => e.oninput = checkAgentValid);
  govEl.onchange = checkAgentValid;
  if (assocEl) assocEl.oninput = checkAgentValid;

  submitBtn.onclick = async () => {
    submitBtn.disabled = true; submitBtn.textContent = "جارِ الحفظ...";
    const w = parseFloat(weightEl.value);
    const { error } = await sb.from('collections').insert({
      agent_id: agentPortalSelected,
      collected_at: todayStr(),
      weight_kg: w,
      governorate: govEl.value,
      location: locEl.value.trim(),
      customer_phone: cphoneEl.value.trim(),
      order_type: orderType,
      association_name: orderType === 'association' ? assocEl.value.trim() : null,
      amount_kwd: orderType === 'purchase' ? +(w*PRICE_PER_KG).toFixed(3) : 0,
      quality: quality,
    });
    if (error) { state.error = "تعذّر حفظ العملية: " + error.message; }
    await loadAll();
    if (!state.error) document.getElementById('a-saved') && (document.getElementById('a-saved').textContent = '');
  };
}

// ---------- Supervisor ----------
function renderSupervisor(el) {
  if (state.agents.length === 0) { el.innerHTML = `<div class="card"><div class="empty">أضف مندوبًا من بوابة المدير أولًا.</div></div>`; return; }
  const reconciliation = state.warehouse.map(w => {
    const fieldSum = state.collections.filter(c => c.agent_id === w.agent_id && c.collected_at === w.entry_date).reduce((s,c) => s + Number(c.weight_kg), 0);
    const variance = Number(w.actual_weight_kg) - fieldSum;
    const variancePct = fieldSum > 0 ? (variance/fieldSum)*100 : (Number(w.actual_weight_kg) > 0 ? 100 : 0);
    return { ...w, fieldSum, variance, variancePct };
  }).sort((a,b) => a.entry_date < b.entry_date ? 1 : -1);

  el.innerHTML = `
    <div class="card">
      <h2>🏬 تسجيل وزن المخزون</h2>
      <p class="hint">يُسجَّل الوزن الفعلي بحضورك عند تفريغ المندوب حمولته، ويُقارن تلقائيًا بما سجّله ميدانيًا.</p>
      <div class="grid3">
        <div class="field"><label>المندوب</label><select id="w-agent">${state.agents.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('')}</select></div>
        <div class="field"><label>التاريخ</label><input type="date" id="w-date" value="${todayStr()}" /></div>
        <div class="field"><label>الوزن الفعلي (كغم)</label><input id="w-weight" inputmode="decimal" placeholder="0.0" /></div>
      </div>
      <button class="btn" id="w-submit">✓ تسجيل ومقارنة</button>
      <div id="w-saved" style="color:#8FCB69;font-size:13px;margin-top:8px;"></div>
    </div>
    <div class="card">
      <h2>سجل التسويات</h2>
      ${reconciliation.length === 0 ? `<div class="empty">لا توجد تسويات مسجّلة بعد.</div>` :
        reconciliation.map(r => {
          const flagged = Math.abs(r.variancePct) >= 5;
          const short = r.variance < 0;
          return `
          <div class="row-item" style="flex-direction:column; align-items:stretch; gap:10px; ${flagged ? 'border-color:var(--red-border);' : ''}">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <span class="name">${esc(agentName(r.agent_id))}</span>
              <span style="font-size:12px; color:var(--ink-soft);">${esc(r.entry_date)}</span>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
              <div style="background:var(--paper); border:1px solid var(--stitch); border-radius:8px; padding:8px 10px;">
                <div style="font-size:11px; color:var(--ink-soft); font-weight:700;">سجّله المندوب ميدانيًا</div>
                <div style="font-size:18px; font-weight:800;">${r.fieldSum.toFixed(1)} كغم</div>
              </div>
              <div style="background:var(--paper); border:1px solid var(--stitch); border-radius:8px; padding:8px 10px;">
                <div style="font-size:11px; color:var(--ink-soft); font-weight:700;">وصل المخزون فعليًا</div>
                <div style="font-size:18px; font-weight:800;">${Number(r.actual_weight_kg).toFixed(1)} كغم</div>
              </div>
            </div>
            <div class="badge ${flagged?'flagged':'ok'}" style="justify-content:center; padding:8px; font-size:13px;">
              ${flagged ? '⚠️ ' : '✓ '}
              ${short ? `نقص ${Math.abs(r.variance).toFixed(1)} كغم عن المسجّل ميدانيًا (${Math.abs(r.variancePct).toFixed(0)}%)` :
                r.variance > 0 ? `زيادة ${r.variance.toFixed(1)} كغم عن المسجّل ميدانيًا (${r.variancePct.toFixed(0)}%)` : 'مطابق تمامًا'}
            </div>
            <div style="display:flex; gap:8px;">
              <button class="btn ghost btn-edit-wh" data-id="${r.id}" data-weight="${r.actual_weight_kg}" style="flex:1; font-size:12px; padding:8px;">✏️ تعديل الوزن</button>
              <button class="btn ghost btn-undo-wh" data-id="${r.id}" style="flex:1; font-size:12px; padding:8px; color:var(--red-ink); border-color:var(--red-border);">↩️ تراجع (حذف)</button>
            </div>
          </div>`;
        }).join('')}
    </div>
  `;
  const submit = document.getElementById('w-submit');
  submit.onclick = async () => {
    const agentId = document.getElementById('w-agent').value;
    const date = document.getElementById('w-date').value;
    const w = parseFloat(document.getElementById('w-weight').value);
    if (!agentId || !date || !w || w <= 0) return;
    submit.disabled = true; submit.textContent = "جارِ الحفظ...";
    const { error } = await sb.from('warehouse_entries').insert({ agent_id: agentId, entry_date: date, actual_weight_kg: w });
    if (error) state.error = "تعذّر حفظ وزن المخزون: " + error.message;
    await loadAll();
  };

  document.querySelectorAll('.btn-edit-wh').forEach(b => b.onclick = () => {
    const newVal = prompt('عدّل الوزن الفعلي المسجَّل بالمخزون (كغم):', b.dataset.weight);
    if (newVal === null) return;
    const w = parseFloat(normalizeDigits(newVal));
    if (!w || w <= 0) { alert('أدخل رقمًا صحيحًا أكبر من صفر.'); return; }
    sb.from('warehouse_entries').update({ actual_weight_kg: w }).eq('id', b.dataset.id).then(({ error }) => {
      if (error) { state.error = "تعذّر تعديل الوزن: " + error.message; render(); return; }
      loadAll();
    });
  });

  document.querySelectorAll('.btn-undo-wh').forEach(b => b.onclick = () => {
    if (!confirm('هل تريد التراجع عن هذه التسوية وحذفها نهائيًا؟')) return;
    sb.from('warehouse_entries').delete().eq('id', b.dataset.id).then(({ error }) => {
      if (error) { state.error = "تعذّر الحذف: " + error.message; render(); return; }
      loadAll();
    });
  });
}

// ---------- Accountant ----------
function renderAccountant(el) {
  el.innerHTML = `
    <div class="card">
      <h2>💰 كشف عهدة المناديب</h2>
      ${state.agents.length === 0 ? `<div class="empty">لا يوجد مناديب بعد.</div>` :
        state.agents.map(a => { const b = balancesFor(a.id); return `
        <div class="row-item">
          <span class="name">${esc(a.name)}</span>
          <div class="metrics">
            <div>مستحق: <b>${fmtKWD(b.owed)}</b></div>
            <div>مدفوع: <b style="color:#8FCB69;">${fmtKWD(b.paid)}</b></div>
            <div>متبقٍ: <b style="color:${b.remaining>0?'var(--amber-text)':'#8FCB69'}">${fmtKWD(b.remaining)}</b></div>
          </div>
        </div>`; }).join('')}
    </div>
    <div class="card">
      <h2>تسجيل دفعة لمندوب</h2>
      <div class="field"><label>المندوب</label><select id="p-agent"><option value="">اختر مندوبًا</option>${state.agents.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('')}</select></div>
      <div class="field"><label>المبلغ (د.ك)</label><input id="p-amount" inputmode="decimal" placeholder="0.000" /></div>
      <div class="field"><label>ملاحظة (اختياري)</label><input id="p-note" placeholder="مثال: دفعة أسبوعية" /></div>
      <button class="btn full" id="p-submit">+ تسجيل الدفعة</button>
    </div>
    <div class="card">
      <h2>سجل الدفعات</h2>
      ${state.payments.length === 0 ? `<div class="empty">لا توجد دفعات مسجّلة بعد.</div>` :
        state.payments.slice(0,10).map(p => `<div class="row-item"><span>${esc(agentName(p.agent_id))}</span><span style="color:var(--muted2);">${esc(p.paid_at)}</span><span style="color:#8FCB69;font-weight:700;">${fmtKWD(p.amount_kwd)}</span></div>`).join('')}
    </div>
  `;
  document.getElementById('p-submit').onclick = async () => {
    const agentId = document.getElementById('p-agent').value;
    const amt = parseFloat(document.getElementById('p-amount').value);
    const note = document.getElementById('p-note').value.trim();
    if (!agentId || !amt || amt <= 0) return;
    const btn = document.getElementById('p-submit');
    btn.disabled = true; btn.textContent = "جارِ الحفظ...";
    const { error } = await sb.from('payments').insert({ agent_id: agentId, amount_kwd: amt, note, paid_at: todayStr() });
    if (error) state.error = "تعذّر حفظ الدفعة: " + error.message;
    await loadAll();
  };
}

// Force all numeric input to Western digits (0-9), regardless of keyboard/locale,
// so weights/amounts/phone numbers/civil IDs stay consistent across every report.
const ARABIC_INDIC = { '٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9' };
const PERSIAN_DIGITS = { '۰':'0','۱':'1','۲':'2','۳':'3','۴':'4','۵':'5','۶':'6','۷':'7','۸':'8','۹':'9' };
function normalizeDigits(str) {
  return str.replace(/[٠-٩۰-۹]/g, (d) => ARABIC_INDIC[d] || PERSIAN_DIGITS[d] || d);
}
document.addEventListener('input', (e) => {
  const el = e.target;
  if (el.tagName !== 'INPUT') return;
  const converted = normalizeDigits(el.value);
  if (converted !== el.value) {
    const pos = el.selectionStart;
    el.value = converted;
    if (pos != null) el.setSelectionRange(pos, pos);
  }
});

checkAuth();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch((err) => console.warn('SW registration failed:', err));
  });
}
</script>
