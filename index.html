<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>لباس الكويت</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="apple-touch-icon" href="assets/icon-192.png" />
<meta name="theme-color" content="#17171B" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #17171B;
    --card: #1F1F24;
    --card-inner: #1A1A1F;
    --border: #2C2C33;
    --text: #ECECEE;
    --muted: #9C9CA6;
    --muted2: #87878F;
    --disabled: #6B6B73;
    --green: #6FA83A;
    --green-hover: #82C34A;
    --green-deep: #4D7A26;
    --gray-brand: #4D4C51;
    --gray-brand-light: #6B6A70;
    --amber-bg: #3A3315;
    --amber-text: #E8C766;
    --amber-btn: #7A5B18;
    --red-bg: #3A1414;
    --red-text: #E88585;
    --red-border: #6B2020;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Tahoma', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 0 16px 96px; }
  header.app-header {
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 22px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo-badge {
    width: 48px; height: 48px; border-radius: 12px;
    background: #fff; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; padding: 4px; border: 1px solid var(--border);
  }
  .logo-badge img { width: 100%; height: 100%; object-fit: contain; }
  header.app-header h1 { margin: 0; font-size: 22px; color: #fff; }
  header.app-header p { margin: 2px 0 0; font-size: 13px; color: var(--muted2); }

  .tabs { display: flex; gap: 8px; margin-bottom: 22px; overflow-x: auto; padding-bottom: 2px; }
  .tab-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 16px; border-radius: 999px; border: none; cursor: pointer;
    font-size: 14px; font-weight: 600; white-space: nowrap;
    background: #232329; color: var(--muted);
    font-family: inherit;
  }
  .tab-btn.active { background: var(--green); color: #fff; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 20px; margin-bottom: 18px;
  }
  .card h2 { margin: 0 0 14px; font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .card p.hint { font-size: 13px; color: var(--muted2); margin: -8px 0 16px; }

  .stat-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 18px; }
  .stat {
    flex: 1; min-width: 130px; background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px;
  }
  .stat .label { font-size: 12px; color: var(--muted2); margin-bottom: 4px; }
  .stat .value { font-size: 22px; font-weight: 700; color: #fff; }
  .stat .value.amber { color: var(--amber-text); }
  .stat .value.green { color: #8FCB69; }

  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .field { margin-bottom: 14px; }
  input, select {
    width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card-inner); color: var(--text); font-size: 14px; font-family: inherit;
  }
  input:focus, select:focus { outline: 1px solid var(--green); }

  .btn {
    background: var(--green); color: #fff; border: none; border-radius: 10px;
    padding: 12px 18px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 6px; justify-content: center;
  }
  .btn:hover { background: var(--green-hover); }
  .btn:disabled { background: var(--border); color: var(--disabled); cursor: not-allowed; }
  .btn.full { width: 100%; }
  .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }

  .pill-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
  .pill-toggle button {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .pill-toggle button.active-purchase { background: var(--green); border-color: var(--green); color: #fff; }
  .pill-toggle button.active-assoc { background: var(--amber-btn); border-color: var(--amber-btn); color: #fff; }

  .row-item {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px;
    background: var(--card-inner); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 8px;
  }
  .row-item .name { font-weight: 700; }
  .row-item .sub { font-size: 12px; color: var(--muted2); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
  .metrics { display: flex; gap: 18px; font-size: 13px; }
  .metrics .m-label { color: var(--muted2); font-size: 11px; }
  .metrics .m-value { font-weight: 700; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: right; color: var(--muted2); font-weight: 600; padding: 8px 6px; border-bottom: 1px solid var(--border); }
  tbody td { padding: 9px 6px; border-bottom: 1px solid #222227; }
  tbody tr:last-child td { border-bottom: none; }
  .badge { font-size: 11px; padding: 2px 9px; border-radius: 999px; font-weight: 600; display: inline-flex; align-items:center; gap:4px; }
  .badge.purchase { background: rgba(111,168,58,0.25); color: #8FCB69; }
  .badge.assoc { background: var(--amber-bg); color: var(--amber-text); }
  .badge.flagged { background: var(--red-bg); color: var(--red-text); border: 1px solid var(--red-border); }
  .badge.ok { background: rgba(111,168,58,0.2); color: #8FCB69; }

  .empty { text-align: center; padding: 28px 0; color: var(--disabled); font-size: 13px; }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;
    padding: 16px; z-index: 50;
  }
  .modal {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px;
    width: 100%; max-width: 420px;
  }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .modal-head h3 { margin: 0; font-size: 17px; }
  .modal-head button { background: none; border: none; color: var(--muted2); font-size: 20px; cursor: pointer; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 7px 13px; border-radius: 10px; border: 1px solid var(--border); color: var(--muted);
    background: transparent; font-family: inherit; font-size: 13px; cursor: pointer;
  }
  .chip.active { background: var(--green); border-color: var(--green); color: #fff; }
  .modal-actions { display: flex; gap: 8px; margin-top: 8px; }

  .banner {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px;
    background: #14231C; border: 1px solid #25402F; border-radius: 16px; padding: 14px 18px; margin-bottom: 20px;
  }
  .banner .left { display: flex; align-items: center; gap: 10px; }
  .banner .t { font-weight: 700; font-size: 14px; }
  .banner .d { font-size: 12px; color: var(--muted2); }
  .error-banner {
    background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red-text);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .loading { text-align: center; padding: 100px 0; color: var(--muted); }
  .grid3 { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 640px) { .grid3 { grid-template-columns: 1fr 1fr 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <header class="app-header">
    <div class="logo-badge"><img src="assets/logo.png" alt="لباس الكويت" /></div>
    <div>
      <h1>لباس الكويت</h1>
      <p>نظام إدارة عمليات جمع الملابس المستعملة — شركة زيرو ويست</p>
    </div>
  </header>

  <div id="error-slot"></div>
  <div id="banner-slot"></div>
  <div class="tabs" id="tabs"></div>
  <div id="content"><div class="loading">جارِ تحميل البيانات...</div></div>
</div>

<script>
const SUPABASE_URL = "https://yfaxfwsguepysqhtzifd.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_0QK8Ki285VMpOqofRF9kCw_Y0sPHUnO";
const PRICE_PER_KG = 0.170;
const GOVERNORATES = ["العاصمة", "حولي", "الفروانية", "مبارك الكبير", "الأحمدي", "الجهراء"];

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let state = {
  tab: "manager",
  agents: null,
  collections: null,
  warehouse: null,
  payments: null,
  error: null,
};

function fmtKWD(n) { return `${Number(n).toFixed(3)} د.ك`; }
function todayStr() { return new Date().toISOString().slice(0,10); }
function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function loadAll() {
  state.error = null;
  try {
    const [{data: agents, error: e1}, {data: collections, error: e2}, {data: warehouse, error: e3}, {data: payments, error: e4}] =
      await Promise.all([
        sb.from('agents').select('*').order('created_at', {ascending: false}),
        sb.from('collections').select('*').order('collected_at', {ascending: false}).limit(300),
        sb.from('warehouse_entries').select('*').order('entry_date', {ascending: false}).limit(200),
        sb.from('payments').select('*').order('paid_at', {ascending: false}).limit(200),
      ]);
    if (e1 || e2 || e3 || e4) throw (e1 || e2 || e3 || e4);
    state.agents = agents || [];
    state.collections = collections || [];
    state.warehouse = warehouse || [];
    state.payments = payments || [];
  } catch (err) {
    console.error(err);
    state.error = "تعذّر الاتصال بقاعدة البيانات. تأكد من تنفيذ schema.sql في مشروع Supabase، ثم أعد تحميل الصفحة.";
  }
  render();
}

function balancesFor(agentId) {
  const kg = state.collections.filter(c => c.agent_id === agentId).reduce((s,c) => s + Number(c.weight_kg), 0);
  const orders = state.collections.filter(c => c.agent_id === agentId).length;
  const owed = state.collections.filter(c => c.agent_id === agentId && c.order_type === 'purchase').reduce((s,c) => s + Number(c.amount_kwd), 0);
  const paid = state.payments.filter(p => p.agent_id === agentId).reduce((s,p) => s + Number(p.amount_kwd), 0);
  return { kg, orders, owed, paid, remaining: owed - paid };
}

function agentName(id) {
  return state.agents.find(a => a.id === id)?.name || "—";
}

// ---------- render shell ----------
function render() {
  const tabs = [
    { id: "manager", label: "بوابة المدير", icon: "📊" },
    { id: "agent", label: "بوابة المندوب", icon: "🚚" },
    { id: "supervisor", label: "بوابة المشرف", icon: "🏬" },
    { id: "accountant", label: "بوابة المحاسب", icon: "🧮" },
  ];
  document.getElementById('tabs').innerHTML = tabs.map(t =>
    `<button class="tab-btn ${state.tab===t.id?'active':''}" data-tab="${t.id}">${t.icon} ${t.label}</button>`
  ).join('');
  document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => { state.tab = b.dataset.tab; render(); });

  document.getElementById('error-slot').innerHTML = state.error
    ? `<div class="error-banner"><span>⚠️ ${esc(state.error)}</span><button onclick="loadAll()" class="btn ghost" style="padding:6px 10px;">إعادة المحاولة</button></div>`
    : '';

  const empty = state.agents && state.agents.length === 0 && state.collections.length === 0;
  document.getElementById('banner-slot').innerHTML = empty ? `
    <div class="banner">
      <div class="left"><span style="font-size:20px;">✨</span>
        <div><div class="t">لا يوجد مناديب بعد</div><div class="d">ابدأ بإضافة أول مندوب من بوابة المدير</div></div>
      </div>
    </div>` : '';

  const content = document.getElementById('content');
  if (state.agents === null) { content.innerHTML = `<div class="loading">جارِ تحميل البيانات...</div>`; return; }

  if (state.tab === 'manager') renderManager(content);
  else if (state.tab === 'agent') renderAgent(content);
  else if (state.tab === 'supervisor') renderSupervisor(content);
  else if (state.tab === 'accountant') renderAccountant(content);
}

// ---------- Manager ----------
function renderManager(el) {
  const totalKg = state.collections.reduce((s,c) => s + Number(c.weight_kg), 0);
  const totalOrders = state.collections.length;
  let totalOwed = 0, totalPaid = 0;
  state.agents.forEach(a => { const b = balancesFor(a.id); totalOwed += b.owed; totalPaid += b.paid; });

  el.innerHTML = `
    <div class="stat-row">
      <div class="stat"><div class="label">إجمالي الكيلوغرامات</div><div class="value">${totalKg.toFixed(1)} كغم</div></div>
      <div class="stat"><div class="label">عدد العمليات</div><div class="value">${totalOrders}</div></div>
      <div class="stat"><div class="label">مستحق للمناديب</div><div class="value amber">${fmtKWD(totalOwed)}</div></div>
      <div class="stat"><div class="label">المدفوع فعليًا</div><div class="value green">${fmtKWD(totalPaid)}</div></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <h2 style="margin:0;">👥 المناديب (${state.agents.length})</h2>
        <button class="btn" id="btn-add-agent">+ إضافة مندوب</button>
      </div>
      <div id="agents-list">${state.agents.length === 0 ? `<div class="empty">لا يوجد مناديب بعد.</div>` :
        state.agents.map(a => {
          const b = balancesFor(a.id);
          return `<div class="row-item">
            <div><div class="name">${esc(a.name)}</div><div class="sub">📍 ${esc((a.governorates||[]).join('، '))}</div></div>
            <div class="metrics">
              <div><div class="m-label">كغم</div><div class="m-value">${b.kg.toFixed(1)}</div></div>
              <div><div class="m-label">طلبات</div><div class="m-value">${b.orders}</div></div>
              <div><div class="m-label">المتبقي</div><div class="m-value" style="color:${b.remaining>0?'var(--amber-text)':'#8FCB69'}">${fmtKWD(b.remaining)}</div></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="card">
      <h2>آخر عمليات الاستلام</h2>
      ${collectionsTable(state.collections.slice(0,10))}
    </div>
  `;
  document.getElementById('btn-add-agent').onclick = openAddAgentModal;
}

function collectionsTable(rows) {
  if (rows.length === 0) return `<div class="empty">لا توجد عمليات مسجّلة بعد.</div>`;
  return `<table><thead><tr><th>التاريخ</th><th>المندوب</th><th>الوزن</th><th>النوع</th><th>المبلغ</th></tr></thead><tbody>
    ${rows.map(c => `<tr>
      <td>${esc(c.collected_at)}</td>
      <td>${esc(agentName(c.agent_id))}</td>
      <td>${Number(c.weight_kg).toFixed(1)} كغم</td>
      <td>${c.order_type === 'purchase' ? `<span class="badge purchase">شراء</span>` : `<span class="badge assoc">جمعية: ${esc(c.association_name||'—')}</span>`}</td>
      <td>${c.order_type === 'purchase' ? fmtKWD(c.amount_kwd) : '—'}</td>
    </tr>`).join('')}
  </tbody></table>`;
}

function openAddAgentModal() {
  const govs = new Set();
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-head"><h3>إضافة مندوب</h3><button id="m-close">×</button></div>
      <div class="field"><label>اسم المندوب</label><input id="m-name" placeholder="مثال: محمد أحمد" /></div>
      <div class="field"><label>رقم الهاتف</label><input id="m-phone" placeholder="+965..." dir="ltr" /></div>
      <div class="field"><label>المحافظات</label><div class="chip-group" id="m-govs">
        ${GOVERNORATES.map(g => `<button type="button" class="chip" data-g="${g}">${g}</button>`).join('')}
      </div></div>
      <div class="modal-actions">
        <button class="btn ghost" id="m-cancel" style="flex:1;">إلغاء</button>
        <button class="btn" id="m-save" style="flex:1;" disabled>حفظ المندوب</button>
      </div>
    </div>`;
  document.body.appendChild(backdrop);
  const nameEl = backdrop.querySelector('#m-name');
  const phoneEl = backdrop.querySelector('#m-phone');
  const saveBtn = backdrop.querySelector('#m-save');
  function checkValid() { saveBtn.disabled = !(nameEl.value.trim() && phoneEl.value.trim() && govs.size > 0); }
  nameEl.oninput = checkValid; phoneEl.oninput = checkValid;
  backdrop.querySelectorAll('#m-govs .chip').forEach(chip => {
    chip.onclick = () => {
      const g = chip.dataset.g;
      if (govs.has(g)) { govs.delete(g); chip.classList.remove('active'); }
      else { govs.add(g); chip.classList.add('active'); }
      checkValid();
    };
  });
  backdrop.querySelector('#m-close').onclick = () => backdrop.remove();
  backdrop.querySelector('#m-cancel').onclick = () => backdrop.remove();
  backdrop.onclick = (e) => { if (e.target === backdrop) backdrop.remove(); };
  saveBtn.onclick = async () => {
    saveBtn.disabled = true; saveBtn.textContent = "جارِ الحفظ...";
    const { error } = await sb.from('agents').insert({
      name: nameEl.value.trim(), phone: phoneEl.value.trim(), governorates: Array.from(govs)
    });
    if (error) { state.error = "تعذّر حفظ المندوب: " + error.message; render(); }
    backdrop.remove();
    await loadAll();
  };
}

// ---------- Agent ----------
let agentPortalSelected = null;
function renderAgent(el) {
  if (state.agents.length === 0) { el.innerHTML = `<div class="card"><div class="empty">أضف مندوبًا من بوابة المدير أولًا.</div></div>`; return; }
  if (!agentPortalSelected) agentPortalSelected = state.agents[0].id;
  const b = balancesFor(agentPortalSelected);
  el.innerHTML = `
    <div class="card">
      <div class="field"><label>المندوب</label>
        <select id="a-select">${state.agents.map(a => `<option value="${a.id}" ${a.id===agentPortalSelected?'selected':''}>${esc(a.name)}</option>`).join('')}</select>
      </div>
      <div class="stat-row" style="margin-bottom:0;">
        <div class="stat"><div class="label">عهدتي المستحقة</div><div class="value">${fmtKWD(b.owed)}</div></div>
        <div class="stat"><div class="label">المستلَم مني</div><div class="value green">${fmtKWD(b.paid)}</div></div>
        <div class="stat"><div class="label">الرصيد المتبقي</div><div class="value ${b.remaining>0?'amber':'green'}">${fmtKWD(b.remaining)}</div></div>
      </div>
    </div>
    <div class="card">
      <h2>🚚 تسجيل عملية استلام جديدة</h2>
      <div class="pill-toggle">
        <button id="ot-purchase" class="active-purchase">شراء مباشر (170 فلس/كغم)</button>
        <button id="ot-assoc">شراكة جمعية</button>
      </div>
      <div id="assoc-field" style="display:none;" class="field"><label>اسم الجمعية</label><input id="a-assoc" placeholder="مثال: جمعية المنابر القرآنية" /></div>
      <div class="field"><label>الوزن (كغم)</label><input id="a-weight" inputmode="decimal" placeholder="0.0" /></div>
      <div class="field"><label>مكان الاستلام</label><input id="a-location" placeholder="المحافظة، المنطقة، القطعة، المنزل" /></div>
      <div class="field"><label>رقم هاتف العميل</label><input id="a-cphone" placeholder="+965..." dir="ltr" /></div>
      <div id="amount-preview"></div>
      <button class="btn full" id="a-submit" disabled>✓ حفظ عملية الاستلام</button>
      <div id="a-saved" style="color:#8FCB69;font-size:13px;text-align:center;margin-top:8px;"></div>
    </div>
    <div class="card">
      <h2>عملياتي الأخيرة</h2>
      ${collectionsTable(state.collections.filter(c => c.agent_id === agentPortalSelected).slice(0,8))}
    </div>
  `;
  document.getElementById('a-select').onchange = (e) => { agentPortalSelected = e.target.value; renderAgent(el); };

  let orderType = 'purchase';
  const purBtn = document.getElementById('ot-purchase'), assocBtn = document.getElementById('ot-assoc');
  const assocField = document.getElementById('assoc-field');
  purBtn.onclick = () => { orderType='purchase'; purBtn.className='active-purchase'; assocBtn.className=''; assocField.style.display='none'; checkAgentValid(); };
  assocBtn.onclick = () => { orderType='association'; assocBtn.className='active-assoc'; purBtn.className=''; assocField.style.display='block'; checkAgentValid(); };

  const weightEl = document.getElementById('a-weight'), locEl = document.getElementById('a-location'), cphoneEl = document.getElementById('a-cphone'), assocEl = document.getElementById('a-assoc');
  const submitBtn = document.getElementById('a-submit');
  const preview = document.getElementById('amount-preview');

  function checkAgentValid() {
    const w = parseFloat(weightEl.value) || 0;
    if (orderType === 'purchase' && w > 0) {
      preview.innerHTML = `<div class="row-item" style="justify-content:space-between;"><span style="color:var(--muted2);font-size:13px;">المبلغ المستحق</span><span style="font-weight:700;font-size:16px;">${fmtKWD(w*PRICE_PER_KG)}</span></div>`;
    } else preview.innerHTML = '';
    const valid = w > 0 && locEl.value.trim() && cphoneEl.value.trim() && (orderType==='purchase' || (assocEl && assocEl.value.trim()));
    submitBtn.disabled = !valid;
  }
  [weightEl, locEl, cphoneEl].forEach(e => e.oninput = checkAgentValid);
  if (assocEl) assocEl.oninput = checkAgentValid;

  submitBtn.onclick = async () => {
    submitBtn.disabled = true; submitBtn.textContent = "جارِ الحفظ...";
    const w = parseFloat(weightEl.value);
    const { error } = await sb.from('collections').insert({
      agent_id: agentPortalSelected,
      collected_at: todayStr(),
      weight_kg: w,
      location: locEl.value.trim(),
      customer_phone: cphoneEl.value.trim(),
      order_type: orderType,
      association_name: orderType === 'association' ? assocEl.value.trim() : null,
      amount_kwd: orderType === 'purchase' ? +(w*PRICE_PER_KG).toFixed(3) : 0,
    });
    if (error) { state.error = "تعذّر حفظ العملية: " + error.message; }
    await loadAll();
    if (!state.error) document.getElementById('a-saved') && (document.getElementById('a-saved').textContent = '');
  };
}

// ---------- Supervisor ----------
function renderSupervisor(el) {
  if (state.agents.length === 0) { el.innerHTML = `<div class="card"><div class="empty">أضف مندوبًا من بوابة المدير أولًا.</div></div>`; return; }
  const reconciliation = state.warehouse.map(w => {
    const fieldSum = state.collections.filter(c => c.agent_id === w.agent_id && c.collected_at === w.entry_date).reduce((s,c) => s + Number(c.weight_kg), 0);
    const variance = Number(w.actual_weight_kg) - fieldSum;
    const variancePct = fieldSum > 0 ? (variance/fieldSum)*100 : (Number(w.actual_weight_kg) > 0 ? 100 : 0);
    return { ...w, fieldSum, variance, variancePct };
  }).sort((a,b) => a.entry_date < b.entry_date ? 1 : -1);

  el.innerHTML = `
    <div class="card">
      <h2>🏬 تسجيل وزن المخزون</h2>
      <p class="hint">يُسجَّل الوزن الفعلي بحضورك عند تفريغ المندوب حمولته، ويُقارن تلقائيًا بما سجّله ميدانيًا.</p>
      <div class="grid3">
        <div class="field"><label>المندوب</label><select id="w-agent">${state.agents.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('')}</select></div>
        <div class="field"><label>التاريخ</label><input type="date" id="w-date" value="${todayStr()}" /></div>
        <div class="field"><label>الوزن الفعلي (كغم)</label><input id="w-weight" inputmode="decimal" placeholder="0.0" /></div>
      </div>
      <button class="btn" id="w-submit">✓ تسجيل ومقارنة</button>
      <div id="w-saved" style="color:#8FCB69;font-size:13px;margin-top:8px;"></div>
    </div>
    <div class="card">
      <h2>سجل التسويات</h2>
      ${reconciliation.length === 0 ? `<div class="empty">لا توجد تسويات مسجّلة بعد.</div>` : `
      <table><thead><tr><th>التاريخ</th><th>المندوب</th><th>ميدانيًا</th><th>بالمخزون</th><th>الفارق</th></tr></thead><tbody>
      ${reconciliation.map(r => {
        const flagged = Math.abs(r.variancePct) >= 5;
        return `<tr>
          <td>${esc(r.entry_date)}</td>
          <td>${esc(agentName(r.agent_id))}</td>
          <td>${r.fieldSum.toFixed(1)} كغم</td>
          <td>${Number(r.actual_weight_kg).toFixed(1)} كغم</td>
          <td><span class="badge ${flagged?'flagged':'ok'}">${flagged?'⚠️ ':''}${r.variance>0?'+':''}${r.variance.toFixed(1)} كغم (${r.variancePct.toFixed(0)}%)</span></td>
        </tr>`;
      }).join('')}
      </tbody></table>`}
    </div>
  `;
  const submit = document.getElementById('w-submit');
  submit.onclick = async () => {
    const agentId = document.getElementById('w-agent').value;
    const date = document.getElementById('w-date').value;
    const w = parseFloat(document.getElementById('w-weight').value);
    if (!agentId || !date || !w || w <= 0) return;
    submit.disabled = true; submit.textContent = "جارِ الحفظ...";
    const { error } = await sb.from('warehouse_entries').insert({ agent_id: agentId, entry_date: date, actual_weight_kg: w });
    if (error) state.error = "تعذّر حفظ وزن المخزون: " + error.message;
    await loadAll();
  };
}

// ---------- Accountant ----------
function renderAccountant(el) {
  el.innerHTML = `
    <div class="card">
      <h2>💰 كشف عهدة المناديب</h2>
      ${state.agents.length === 0 ? `<div class="empty">لا يوجد مناديب بعد.</div>` :
        state.agents.map(a => { const b = balancesFor(a.id); return `
        <div class="row-item">
          <span class="name">${esc(a.name)}</span>
          <div class="metrics">
            <div>مستحق: <b>${fmtKWD(b.owed)}</b></div>
            <div>مدفوع: <b style="color:#8FCB69;">${fmtKWD(b.paid)}</b></div>
            <div>متبقٍ: <b style="color:${b.remaining>0?'var(--amber-text)':'#8FCB69'}">${fmtKWD(b.remaining)}</b></div>
          </div>
        </div>`; }).join('')}
    </div>
    <div class="card">
      <h2>تسجيل دفعة لمندوب</h2>
      <div class="field"><label>المندوب</label><select id="p-agent"><option value="">اختر مندوبًا</option>${state.agents.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('')}</select></div>
      <div class="field"><label>المبلغ (د.ك)</label><input id="p-amount" inputmode="decimal" placeholder="0.000" /></div>
      <div class="field"><label>ملاحظة (اختياري)</label><input id="p-note" placeholder="مثال: دفعة أسبوعية" /></div>
      <button class="btn full" id="p-submit">+ تسجيل الدفعة</button>
    </div>
    <div class="card">
      <h2>سجل الدفعات</h2>
      ${state.payments.length === 0 ? `<div class="empty">لا توجد دفعات مسجّلة بعد.</div>` :
        state.payments.slice(0,10).map(p => `<div class="row-item"><span>${esc(agentName(p.agent_id))}</span><span style="color:var(--muted2);">${esc(p.paid_at)}</span><span style="color:#8FCB69;font-weight:700;">${fmtKWD(p.amount_kwd)}</span></div>`).join('')}
    </div>
  `;
  document.getElementById('p-submit').onclick = async () => {
    const agentId = document.getElementById('p-agent').value;
    const amt = parseFloat(document.getElementById('p-amount').value);
    const note = document.getElementById('p-note').value.trim();
    if (!agentId || !amt || amt <= 0) return;
    const btn = document.getElementById('p-submit');
    btn.disabled = true; btn.textContent = "جارِ الحفظ...";
    const { error } = await sb.from('payments').insert({ agent_id: agentId, amount_kwd: amt, note, paid_at: todayStr() });
    if (error) state.error = "تعذّر حفظ الدفعة: " + error.message;
    await loadAll();
  };
}

loadAll();
</script>
</body>
</html>
